<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box sizing</title>
    <style>
        div{
            height: 120px;
            width:80px;
            padding: 20px;
            margin: 10px;
            border: 5px solid blue;
            background-color: aquamarine;
            color: brown;
        }
        .box1{
            box-sizing: content-box;/*In content box padding , border , margin all lies outside the total area*/
        }
        .box2{
            box-sizing: border-box;/*In border box all the things except margin lies inside the content area*/
        }
    </style>
</head>
<body>
    
        <div class="box1">Box1</div>
        <div class="box2">Box2</div>
   
</body>
</html>

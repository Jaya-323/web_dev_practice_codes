<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box model</title>
    <style>
        div{
           
            padding: 5px;
            border: 5px solid black;
            margin: 5px;
           
        }
        .box1,.box2,.box3{
            height:30px;
            width: 15px;
            
        }
        /*Margin is not included in the background color of a class but padding is included*/
        .box1{
            background-color: bisque;
            padding: 100px;
            margin: 100px;
        }
         .box2{
            background-color: rgb(210, 121, 12);
            margin: 100px;
             padding: 100px;
        }
         .box3{
            background-color: rgb(12, 19, 210);
            margin: 100px;
             padding: 100px;
        }
        
        .model{
            display:flex;
            gap: 5px;
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div class="model">
        <p>Box Model</p>
        <div class="box1">Box1</div>
        <div class="box2">Box2</div>
        <div class="box3">Box3</div>
    </div>
</body>
</html>

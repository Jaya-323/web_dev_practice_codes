<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=l">
    <title>Link styling</title>
    <style>
        nav a{
            text-decoration: none;
            color:bisque;
            font-size: 20px;
            font-family: Arial, Helvetica, sans-serif;
            padding:20px;
           
        }
        nav{
            padding: 10px;
            margin: 10px;
            background-color: rgb(1, 213, 206);
            border: 10px solid black;
        }
        a:hover{
            color:red;
        }
        a:visited{
            color:green;
        }

    </style>
</head>

<body>
     <nav>
        <a href="#">Home</a>
        <a href="#">Members</a>
        <a href="#">Events</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</body>
</html>

<html lang="en">
<head>

    <!--Internal css-->
    <style>
        h2{
            color: bisque;
        }

    <link rel="stylesheet" href="style1.css">

    <ul>
        <li>1st element</li>
        <li>2nd element</li>
        <li>3rd <em>element</em></li>
    </ul>
    <ol>
        <li class="a">1st element</li>
        <li class="a b">2nd element</li>
        <li class="ab">3rd <em>element</em></li>
    </ol>
    

</body>
</html>

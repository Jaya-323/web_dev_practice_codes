<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascade</title>
    <style>
        h1{
            color:rgb(2, 9, 18);
            background-color:rgb(4, 126, 90);
        }
        h1{
            color:rgb(15, 5, 1);
            background-color:rgb(140, 64, 9);
        }
        </style>
</head>
<body>
    <h1>The last property specified for any tag will be applied that is cascading</h1>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive page</title>
    <style>
        .container{
            display:flex;
            flex-direction: row;
            flex-wrap:wrap;
            box-sizing: border-box;
            height: 250px;
            width: 100%;
        }
        .box1,.box2,.box3,.box4{
            width: 25%;
        }
        @media screen and (max-width:300px) and (min-width:100px){
            .container{
            display:flex;
            flex-direction: column;
            box-sizing: border-box;
                height: 250px;
            width: 100%;
        }
        .box1,.box2,.box3,.box4{
            width: 100%;
            height: 25%;
        
            
        }
    }
        @media screen and (max-width:500px) and (min-width: 301px){
             .container{
            display:flex;
            flex-wrap:wrap;
        }
        .box1,.box2,.box3,.box4{
            width: 50%;
        }
    }
        @media screen and (min-width:501px) and (max-width:999px){
            .container{
                display:flex;
                flex-direction: row;
            }
               
        }
          
        .box1{
            border:1px solid black;
           box-sizing: border-box;
            background-color: violet;
           color: brown;
           text-shadow: 1px 2px 1px  lightsalmon;
           font-family: Georgia, 'Times New Roman', Times, serif;
        }
        .box2{
             border:1px solid black;
            /*display:flex;*/
           box-sizing: border-box;
            background-color:indigo;
            color: white;
             text-shadow: 1px 2px 1px  rgb(95, 95, 95);
           font-family: Georgia, 'Times New Roman', Times, serif;
            
        }
        .box3{
             border:1px solid black;
           background-color: blue;
          box-sizing: border-box;
            color:rgb(248, 157, 11);
             text-shadow: 1px 2px 1px  rgb(206, 20, 20);
           font-family: Georgia, 'Times New Roman', Times, serif;
           
        }
        .box4{
             border:1px solid black;
        background-color: green;
            box-sizing: border-box;
            color:red;
             text-shadow: 1px 2px 1px  rgb(231, 197, 26);
           font-family: Georgia, 'Times New Roman', Times, serif;
           
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="box1">Box1</div>
    <div class="box2">Box2</div>
    <div class="box3">Box3</div>
    <div class="box4">Box4</div>
    </div>

</body>
</html>

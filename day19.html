<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image clip</title>
    <style>
        .image-clip{
           /* clip-path: polygon(0% 0%, 0% 100%, 25% 100%, 25% 25%, 75% 26%, 75% 75%, 25% 75%, 25% 100%, 100% 100%, 100% 0%);*/
           clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
    </style>
</head>
<body>
    <img class="image-clip" src="resource/Family.png" alt="Image">
</body>
</html>
